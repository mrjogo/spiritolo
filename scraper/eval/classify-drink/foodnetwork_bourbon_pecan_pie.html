<!DOCTYPE html>
<html><body>
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "Recipe",
    "name": "Bourbon Pecan Pie",
    "recipeCategory": "Dessert",
    "keywords": "bourbon, pecans, thanksgiving",
    "cookTime": "PT50M",
    "recipeYield": "1 9-inch pie",
    "recipeIngredient": [
        "2 cups pecan halves",
        "1 cup light corn syrup",
        "1 cup brown sugar",
        "3 tablespoons butter, melted",
        "0.25 cup bourbon",
        "3 large eggs",
        "1 teaspoon vanilla extract",
        "1 9-inch pie crust"
    ],
    "recipeInstructions": "Preheat the oven to 350F. Whisk eggs with corn syrup, sugar, butter, bourbon, and vanilla. Arrange pecans in the crust, pour filling over, and bake for 50 minutes until set."
}
