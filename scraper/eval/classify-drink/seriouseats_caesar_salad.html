<!DOCTYPE html>
<html><body>
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "Recipe",
    "name": "Classic Caesar Salad",
    "recipeCategory": "Salad",
    "recipeYield": "Serves 4",
    "recipeIngredient": [
        "2 heads romaine lettuce",
        "0.5 cup grated parmesan",
        "0.25 cup olive oil",
        "2 tablespoons lemon juice",
        "2 anchovy fillets",
        "1 teaspoon Dijon mustard",
        "1 egg yolk"
    ],
    "recipeInstructions": "Whisk together lemon juice, anchovies, mustard, and egg yolk. Slowly stream in olive oil. Toss with torn lettuce and parmesan."
}
</script>
</body></html>
