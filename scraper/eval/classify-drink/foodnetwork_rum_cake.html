<!DOCTYPE html>
<html><body>
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "Recipe",
    "name": "Caribbean Rum Cake",
    "recipeCategory": "Dessert",
    "keywords": "rum, cake, baking",
    "cookTime": "PT1H",
    "recipeYield": "1 bundt cake",
    "recipeIngredient": [
        "2.5 cups all-purpose flour",
        "1 cup butter, softened",
        "2 cups sugar",
        "4 eggs",
        "0.5 cup dark rum",
        "1 cup milk",
        "2 teaspoons vanilla",
        "1 tablespoon baking powder"
    ],
    "recipeInstructions": "Preheat oven to 325F. Cream butter and sugar, beat in eggs. Alternately add flour mixture and milk. Stir in rum and vanilla. Pour into a greased bundt pan and bake for 60 minutes."
}
</script>
</body></html>
