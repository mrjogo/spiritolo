<html><body>
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "Recipe",
    "name": "Espresso Martini",
    "recipeCategory": "Dessert",
    "recipeYield": "1 cocktail",
    "recipeIngredient": [
        "2 oz vodka",
        "0.5 oz coffee liqueur",
        "1 oz fresh espresso",
        "0.25 oz simple syrup",
        "3 coffee beans, for garnish"
    ],
    "recipeInstructions": "Shake all ingredients hard with ice, double-strain into a chilled martini glass, and garnish with three coffee beans."
