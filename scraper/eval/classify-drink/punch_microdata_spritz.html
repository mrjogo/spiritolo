<!DOCTYPE html>
<html><body>
<p>A genre-bending cocktail.</p>
<section itemscope itemtype="http://schema.org/Recipe">
    <meta itemprop="description" content="A spritz cocktail."/>
    <meta itemprop="keywords" content="How to Drink French Fluently, spritz, St. Germain"/>
    <span itemprop="author" itemscope itemtype="http://schema.org/Person">
        <meta itemprop="name" content="Punch Staff"/>
    </span>
    <header>
        <h1 itemprop="name">Senorita Spritz</h1>
    </header>
    <ul>
        <li itemprop="recipeIngredient">1 oz St. Germain</li>
        <li itemprop="recipeIngredient">0.75 oz lime juice</li>
        <li itemprop="recipeIngredient">3 dashes Angostura bitters</li>
    </ul>
    <div itemprop="recipeInstructions">Shake the liquid ingredients with ice, strain into a chilled coupe, and top with prosecco.</div>
</section>
</body></html>
